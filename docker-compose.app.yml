# docker-compose.app.yml — Azure VM Application Plane
# Services: target-app (nginx on :80), node-exporter, cadvisor
#
# Usage (on Azure VM):
#   docker compose -f docker-compose.app.yml up -d

networks:
  app-net:
    driver: bridge

services:
  # ── TARGET APP ───────────────────────────────────────────────
  target-app:
    build: ./services/target-app
    container_name: target-app
    ports:
      - "80:5000"
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "1.0"
        reservations:
          memory: 64M
          cpus: "0.1"

  # ── NODE EXPORTER (host metrics) ─────────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    ports:
      - "9100:9100"
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:9100/"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── CADVISOR (container metrics) ─────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "8080:8080"
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
