# docker-compose.control.yml — PC Control Plane
# Services: prometheus, alertmanager, ai-agent, rule-based-agent
#
# Usage:
#   docker compose -f docker-compose.control.yml up -d
#
# Notes:
# - Remote Docker access is via SSH tunnel to localhost:2375 (see scripts/aiops-power.ps1).
# - Grafana runs on the loadgen VM; agents annotate via GRAFANA_URL=http://${AZURE_LOADGEN_IP}:3000.

networks:
  control-net:
    driver: bridge

volumes:
  prometheus_data:

services:
  # ── PROMETHEUS ───────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - type: bind
        source: ../monitoring/prometheus
        target: /etc/prometheus
      - type: volume
        source: prometheus_data
        target: /prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
      - "--storage.tsdb.retention.time=7d"
    ports:
      - "9090:9090"
    networks:
      - control-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1"

  # ── ALERTMANAGER ─────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    volumes:
      - type: bind
        source: ../monitoring/alertmanager
        target: /etc/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    ports:
      - "9093:9093"
    networks:
      - control-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.2"

  # ── AI AGENT ─────────────────────────────────────────────────
  agent:
    build: ../../src/agent/ai-agent
    container_name: aiops-agent
    env_file:
      - ../../.env
    environment:
      - TARGET_CONTAINER_NAME=target-app
      - PROMETHEUS_URL=http://prometheus:9090
      - DOCKER_HOST=tcp://host.docker.internal:2375
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
      - GRAFANA_URL=http://${AZURE_LOADGEN_IP}:3000
      - GRAFANA_TOKEN=${GRAFANA_TOKEN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
    networks:
      - control-net
    depends_on:
      - prometheus
      - alertmanager
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.1"

  # ── RULE-BASED AGENT ─────────────────────────────────────────
  rule-based-agent:
    build: ../../src/agent/rule-based-agent
    container_name: rule-based-agent
    env_file:
      - ../../.env
    environment:
      - TARGET_CONTAINER_NAME=target-app
      - DOCKER_HOST=tcp://host.docker.internal:2375
      - PYTHONUNBUFFERED=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "5001:5001"
    networks:
      - control-net
    depends_on:
      - prometheus
      - alertmanager
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.3"
        reservations:
          memory: 64M
          cpus: "0.05"
