# ═══════════════════════════════════════════════════════════════════════════════
# THESIS PERFORMANCE AUDIT CONFIGURATION — NT531 AIOps PoC
# ═══════════════════════════════════════════════════════════════════════════════

defaults:
  iterations: 1
  duration: 45
  cooldown: 10
  cooldown_between: 15

scenarios:
  # ── THESIS DEMO A: CPU Surgical Remediation ──────────────────────────
  demo_cpu:
    name: "Demo A: CPU Surgical Remediation (Baseline -> Chaos -> Stability)"
    description: "Evaluates AI precision in identifying rogue CPU stressors under load."
    method: "phased_remediation"
    iterations: 1
    agent_scenario: "cpu_stress"
    target_url: "http://4.194.57.3:80"
    metrics:
      throughput: "rate(flask_http_request_total[1m])"
      latency_p95: "flask_http_request_duration_seconds_bucket{le='0.5'}"
      cpu_container: "container_cpu_usage_seconds_total{name='target-app'}"
    phases:
      baseline:
        duration: 45
        locust_tags: "baseline"
      lifecycle:
        duration: 240
        locust_tags: "load"
        inject_fault: "stress_cpu"
        alerts: ["ContainerHighCPU"]
        wait_for_remediation: true

  # ── THESIS DEMO B: Memory Leak Recovery ──────────────────────────────
  demo_memory:
    name: "Demo B: Memory Leak Recovery (Baseline -> Chaos -> Stability)"
    description: "Evaluates AI precision in mitigating memory exhaustion threats."
    method: "phased_remediation"
    iterations: 1
    agent_scenario: "memory_stress"
    target_url: "http://4.194.57.3:80"
    metrics:
      memory_usage_mb: "container_memory_usage_bytes{name='target-app'} / (1024 * 1024)"
      cpu_container: "container_cpu_usage_seconds_total{name='target-app'}"
    phases:
      baseline:
        duration: 45
        locust_tags: "baseline"
      lifecycle:
        duration: 240
        locust_tags: "load"
        inject_fault: "stress_memory"
        alerts: ["ContainerHighMemory"]
        wait_for_remediation: true

  # ── THESIS DEMO C: DDoS Autonomous Defense ─────────────────────────────
  demo_ddos:
    name: "Demo C: DDoS Autonomous Defense (Baseline -> Chaos -> Stability)"
    description: "Evaluates AI response to network-level saturation attacks."
    method: "phased_remediation"
    iterations: 1
    agent_scenario: "ddos_attack"
    target_url: "http://4.194.57.3:80"
    metrics:
      throughput: "rate(flask_http_request_total[1m])"
      attack_block_rate: "sum(increase(iptables_blocked_packets_total[1m]))"
    phases:
      baseline:
        duration: 45
        locust_tags: "baseline"
      lifecycle:
        duration: 300
        locust_tags: "load"
        # DDoS fault IS the load tag, so we trigger logic to block
        alerts: ["HighThroughput", "DDoSDetected"]
        wait_for_remediation: true
