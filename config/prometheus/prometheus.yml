# prometheus.yml — Distributed AIOps setup
# PC scrapes Azure VM targets remotely via public IP.
#
# IMPORTANT: Replace <AZURE_VM_IP> with the actual Azure VM public IP.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "alert.rules.yml"

scrape_configs:
  # ── Local (PC) targets ──────────────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "aiops-agent"
    static_configs:
      - targets: ["agent:8080"]
    metrics_path: /metrics

  - job_name: "rule-based-agent"
    static_configs:
      - targets: ["rule-based-agent:5001"]
    metrics_path: /metrics

  # ── Remote (Azure VM) targets ───────────────────────────────
  - job_name: "target-app"
    static_configs:
      - targets: ["<AZURE_VM_IP>:80"]
    metrics_path: /metrics

  - job_name: "node-exporter-azure"
    static_configs:
      - targets: ["<AZURE_VM_IP>:9100"]

  - job_name: "cadvisor-azure"
    static_configs:
      - targets: ["<AZURE_VM_IP>:8080"]
