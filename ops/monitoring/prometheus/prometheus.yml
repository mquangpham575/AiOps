# prometheus.yml — AIOps 3-Node Azure Architecture
# ==============================================================================
# Prometheus runs on Control Node (10.0.1.4) and scrapes all targets
# via private VNet IPs.
#
# Architecture:
#   Node 1 (Control): 10.0.1.4 - Prometheus, Grafana, AI Agent
#   Node 2 (Load Gen): 10.0.1.5 - node-exporter, Pushgateway
#   Node 3 (App):      10.0.1.6 - target-app, node-exporter, cAdvisor

global:
  scrape_interval: 10s
  evaluation_interval: 10s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "alert.rules.yml"

scrape_configs:
  # ── Control Node (localhost) ───────────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "aiops-agent"
    static_configs:
      - targets: ["ai-agent:8080"]
    metrics_path: /metrics

  - job_name: "rule-based-agent"
    static_configs:
      - targets: ["rule-based-agent:5001"]
    metrics_path: /metrics

  - job_name: "pushgateway"
    static_configs:
      - targets: ["pushgateway:9091"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          instance: "Control Node"
          node: "control-node"
      - targets: ["10.0.1.5:9100"]
        labels:
          instance: "LoadGen Node"
          node: "loadgen-node"
      - targets: ["10.0.1.6:9100"]
        labels:
          instance: "App Node"
          node: "app-node"

  # ── App Node (10.0.1.6) ───────────────────────────────────────
  - job_name: "target-app"
    static_configs:
      - targets: ["10.0.1.6:80"]
    metrics_path: /metrics

  - job_name: "cadvisor-app"
    static_configs:
      - targets: ["10.0.1.6:8080"]
