groups:
  - name: aiops_alerts
    rules:
      # ── Kịch bản 1: Overhead baseline (luôn active để đo) ──
      - alert: AgentOverheadBaseline
        expr: container_memory_usage_bytes{name="aiops-agent"} > 0
        for: 1m
        labels:
          severity: info
          scenario: overhead
        annotations:
          summary: "Agent overhead baseline"
          description: "Agent RAM: {{ $value | humanize1024 }}B"

      # ── Kịch bản 2: DDoS / High latency ────────────────────
      - alert: HighRequestLatency
        expr: |
          rate(flask_http_request_duration_seconds_sum{job="target-app"}[1m])
          /
          rate(flask_http_request_duration_seconds_count{job="target-app"}[1m]) > 1.5
        for: 10s
        labels:
          severity: critical
          scenario: ddos
        annotations:
          summary: "Latency cao bat thuong"
          description: "Latency trung binh: {{ $value | humanizeDuration }}"

      - alert: HighRequestRate
        expr: sum(rate(flask_http_request_total{job="target-app"}[30s])) > 15
        for: 10s
        labels:
          severity: warning
          scenario: ddos
        annotations:
          summary: "Request rate qua cao"
          description: "Rate: {{ $value }} packets/s"

      # ── Kịch bản 3: CPU / Memory stress ────────────────────
      - alert: ProactiveCPUSaturation
        expr: predict_linear(node_cpu_seconds_total{mode!="idle"}[30s], 60) > 0.9
        for: 10s
        labels:
          severity: critical
          scenario: cpu_stress
        annotations:
          summary: "PROACTIVE: CPU qua tai trong < 60s"
          description: "Dự đoán CPU sẽ bùng nổ. AI Agent can thiệp ngay."

      - alert: HighCPUUsage
        expr: |
          100 - (avg by(instance)(
            rate(node_cpu_seconds_total{mode="idle"}[1m])
          ) * 100) > 80
        for: 10s
        labels:
          severity: critical
          scenario: cpu_stress
        annotations:
          summary: "CPU qua tai"
          description: "CPU usage: {{ $value | humanize }}%"

      - alert: ProactiveMemoryExhaustion
        expr: predict_linear(container_memory_usage_bytes{name="target-app"}[1m], 120) > container_spec_memory_limit_bytes{name="target-app"}
        for: 10s
        labels:
          severity: critical
          scenario: memory_stress
        annotations:
          summary: "PROACTIVE: RAM sẽ đầy trong < 120s"
          description: "Dự đoán OOM. AI Agent can thiệp ngay."

      - alert: HighMemoryUsage
        expr: |
          container_memory_usage_bytes{name="target-app"}
          / container_spec_memory_limit_bytes{name="target-app"} * 100 > 60
        for: 10s
        labels:
          severity: critical
          scenario: memory_stress
        annotations:
          summary: "RAM sắp đầy"
          description: "Container memory usage: {{ $value | humanize }}%"

      # ContainerHighCPU: reduced for: to 30s so the 60s stress window has
      # enough time to satisfy two consecutive 15s evaluation periods above threshold.
      # Threshold lowered to 70% — stress-ng on a 1-CPU container reliably hits this.
      - alert: ContainerHighCPU
        expr: |
          rate(container_cpu_usage_seconds_total{name="target-app"}[1m]) * 100 > 70
        for: 30s
        labels:
          severity: critical
          scenario: cpu_stress
        annotations:
          summary: "Container target-app CPU cao"
          description: "Container CPU: {{ $value | humanize }}%"

      - alert: CriticalCPUStress
        expr: rate(container_cpu_usage_seconds_total{name="target-app"}[1m]) * 100 > 95
        for: 15s
        labels:
          severity: critical
          scenario: cpu_stress
        annotations:
          summary: "Critical CPU Stress detected"
          description: "Target app is under extreme CPU pressure: {{ $value | humanize }}%"

      # ── System Load alerts ──────────────────────────────────────
      - alert: HighSystemLoad
        expr: node_load1 > 8.0
        for: 2m
        labels:
          severity: warning
          scenario: system_load
        annotations:
          summary: "System load cao"
          description: "1-minute load average: {{ $value }}"

      - alert: CriticalSystemLoad
        expr: node_load1 > 12.0
        for: 1m
        labels:
          severity: critical
          scenario: system_load
        annotations:
          summary: "System load nguy hiểm"
          description: "1-minute load average: {{ $value }} - cần giảm tải ngay"

      # ── Container restart rate ──────────────────────────────────
      - alert: HighContainerRestartRate
        expr: |
          increase(container_restart_count{name="target-app"}[5m]) > 3
        for: 2m
        labels:
          severity: warning
          scenario: system_load
        annotations:
          summary: "Container restart rate cao"
          description: "target-app restarted {{ $value }} times in 5 minutes"
