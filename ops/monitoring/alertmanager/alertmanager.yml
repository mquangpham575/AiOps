global:
  resolve_timeout: 30s

route:
  group_by: ["alertname", "scenario"]
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 2m
  receiver: all-agents

  routes:
    - match:
        severity: info
      receiver: "null"

receivers:
  - name: "null"

  - name: all-agents
    webhook_configs:
      # AI agent
      - url: "http://ai-agent:8080/webhook?api_key=agent_secret_key_nt531"
        send_resolved: true
      # Rule-based agent (baseline)
      - url: "http://rule-based-agent:5001/alert?api_key=agent_secret_key_nt531"
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["scenario"]
