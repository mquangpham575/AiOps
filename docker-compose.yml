networks:
  aiops-net:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:

services:
  # ── 1. TARGET APP ──────────────────────────────────────────
  target-app:
    build: ./target-app
    container_name: target-app
    ports:
      - "5000:5000"
    networks:
      - aiops-net
    restart: unless-stopped
    # Resource limits for target app
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "1.0"
        reservations:
          memory: 64M
          cpus: "0.1"

  # ── 2. NODE EXPORTER (host metrics) ────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    networks:
      - aiops-net
    restart: unless-stopped

  # ── 3. CADVISOR (container metrics) ────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - aiops-net
    restart: unless-stopped

  # ── 4. PROMETHEUS ───────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    networks:
      - aiops-net
    restart: unless-stopped

  # ── 5. ALERTMANAGER ────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    volumes:
      - ./alertmanager:/etc/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    ports:
      - "9093:9093"
    networks:
      - aiops-net
    restart: unless-stopped

  # ── 6. GRAFANA ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/aiops-overview.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3000:3000"
    networks:
      - aiops-net
    depends_on:
      - prometheus
    restart: unless-stopped

  # ── 7. AI AGENT ─────────────────────────────────────────────
  agent:
    build: ./agent
    container_name: aiops-agent
    env_file:
      - .env
    environment:
      - TARGET_CONTAINER_NAME=target-app
      - PROMETHEUS_URL=http://prometheus:9090
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
      - GRAFANA_URL=http://grafana:3000
      - GRAFANA_TOKEN=${GRAFANA_TOKEN:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8080:8080"
    networks:
      - aiops-net
    depends_on:
      - prometheus
      - alertmanager
    restart: unless-stopped
    # Add capabilities for iptables (needed for rate limiting)
    cap_add:
      - NET_ADMIN
      - NET_RAW
    # Resource limits to prevent agent from using too much
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.1"
