apiVersion: 1

providers:
  - name: "AIOps Dashboards"
    orgId: 1
    folder: "AIOps"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    options:
      path: /etc/grafana/provisioning/dashboards

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
