# ═══════════════════════════════════════════════════════════════════════════════════
# docker-compose.control.yml - Node 1: Control Plane
# ═══════════════════════════════════════════════════════════════════════════════════
#
# Services: Prometheus, AlertManager, AI Agent, Rule-Based Agent, Grafana, Pushgateway
# VM: aiops-control (B2ps_v2) | Private IP: 10.0.1.4
#
# USAGE:
#   docker compose -f docker-compose.control.yml up -d --build
# ═══════════════════════════════════════════════════════════════════════════════════

networks:
  control-net:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:

services:
  # ── PROMETHEUS ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - type: bind
        source: ../monitoring/prometheus
        target: /etc/prometheus
      - type: volume
        source: prometheus_data
        target: /prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
      - "--storage.tsdb.retention.time=7d"
    ports:
      - "9090:9090"
    networks:
      - control-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1"

  # ── ALERTMANAGER ───────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    volumes:
      - type: bind
        source: ../monitoring/alertmanager
        target: /etc/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    ports:
      - "9093:9093"
    networks:
      - control-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.2"

  # ── AI AGENT ───────────────────────────────────────────────────────────────
  ai-agent:
    build: ../../src/agent/ai-agent
    container_name: ai-agent
    env_file:
      - ../../.env
    environment:
      - TARGET_CONTAINER_NAME=target-app
      - PROMETHEUS_URL=http://prometheus:9090
      - ALERTMANAGER_URL=http://alertmanager:9093
      - DOCKER_HOST=tcp://host.docker.internal:2375
      - GRAFANA_URL=http://grafana:3000
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DEBUG_MODE=${DEBUG_MODE:-false}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8083:8080"
    networks:
      - control-net
    depends_on:
      - prometheus
      - alertmanager
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ── RULE-BASED AGENT ────────────────────────────────────────────────────────
  rule-based-agent:
    build: ../../src/agent/rule-based-agent
    container_name: rule-based-agent
    env_file:
      - ../../.env
    environment:
      - TARGET_CONTAINER_NAME=target-app
      - PROMETHEUS_URL=http://prometheus:9090
      - ALERTMANAGER_URL=http://alertmanager:9093
      - DOCKER_HOST=tcp://host.docker.internal:2375
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "5001:5001"
    networks:
      - control-net
    depends_on:
      - prometheus
      - alertmanager
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.3"

  # ── GRAFANA ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
      - GF_SECURITY_ADMIN_USER=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - type: bind
        source: ../monitoring/grafana/provisioning
        target: /etc/grafana/provisioning
      - type: bind
        source: ../monitoring/grafana/dashboards
        target: /var/lib/grafana/dashboards
    ports:
      - "3000:3000"
    networks:
      - control-net
    depends_on:
      - prometheus
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.3"

  # ── PUSHGATEWAY ────────────────────────────────────────────────────────────
  pushgateway:
    image: prom/pushgateway:latest
    container_name: pushgateway
    ports:
      - "9091:9091"
    networks:
      - control-net
    restart: unless-stopped
