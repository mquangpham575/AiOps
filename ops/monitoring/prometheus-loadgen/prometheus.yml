# prometheus-loadgen.yml — Loadgen VM Prometheus
#
# DEPRECATED: This configuration is for future use when the loadgen VM
# runs its own Prometheus instance for local metric collection.
#
# Currently, the system uses Locust directly without a local Prometheus
# on the loadgen VM. Metrics are collected via Locust CSV output
# and analyzed by demo_runner.py.
#
# This file is kept for reference in case future enhancements
# require local metric aggregation on the loadgen VM.

global:
  scrape_interval: 15s

scrape_configs:
  # Future: Collect from local node-exporter
  - job_name: 'loadgen-node'
    static_configs:
      - targets: ['node-exporter-loadgen:9100']

  # Future: OTel Collector metrics (not implemented)
  # - job_name: 'otel-collector'
  #   static_configs:
  #     - targets: ['otel-collector:8889']
