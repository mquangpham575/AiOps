global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "alert.rules.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "aiops-agent"
    static_configs:
      - targets: ["ai-agent:8080"]
    metrics_path: /metrics

  - job_name: "rule-based-agent"
    static_configs:
      - targets: ["rule-based-agent:5001"]
    metrics_path: /metrics

  - job_name: "pushgateway"
    static_configs:
      - targets: ["10.0.1.5:9091"]

  - job_name: "node-exporter-loadgen"
    static_configs:
      - targets: ["10.0.1.5:9100"]

  - job_name: "target-app"
    static_configs:
      - targets: ["10.0.1.6:80"]
    metrics_path: /metrics

  - job_name: "node-exporter-app"
    static_configs:
      - targets: ["10.0.1.6:9100"]

  - job_name: "cadvisor-app"
    static_configs:
      - targets: ["10.0.1.6:9101"]
