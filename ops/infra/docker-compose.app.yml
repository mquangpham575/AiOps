# ═══════════════════════════════════════════════════════════════════════════════════
name: aiops
# docker-compose.app.yml - Node 3: Application Plane
# ═══════════════════════════════════════════════════════════════════════════════════
#
# Services: target-app, node-exporter, cAdvisor
# VM: aiops-app (D2ps_v5) | Private IP: 10.0.1.6
#
# USAGE:
#   docker compose -f docker-compose.app.yml up -d --build
# ═══════════════════════════════════════════════════════════════════════════════════

networks:
  app-net:
    driver: bridge

services:
  # ── TARGET APP ───────────────────────────────────────────────────────────────
  target-app:
    build: ../../src/app/target-app
    container_name: target-app
    environment:
      - FLASK_ENV=production
    ports:
      - "80:5000"
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.1"

  # ── NODE EXPORTER (Monitor App host) ─────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "9100:9100"
    networks:
      - app-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.2"

  # ── CADVISOR (Container metrics) ────────────────────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    command:
      - '--housekeeping_interval=10s'
      - '--docker_only=true'
      - '--store_container_labels=false'
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "8080:8080"
    networks:
      - app-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.3"
