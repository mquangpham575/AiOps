# ═══════════════════════════════════════════════════════════════════════════════════
name: aiops
# docker-compose.loadgen.yml - Node 2: Load Generator
# ═══════════════════════════════════════════════════════════════════════════════════
#
# Services: node-exporter
# VM: aiops-loadgen (D2ps_v5) | Private IP: 10.0.1.5
#
# NOTE: Locust chạy trên host (không trong container) để đạt hiệu năng tối đa.
#
# USAGE:
#   docker compose -f docker-compose.loadgen.yml up -d
#
# Locust commands (chạy trên host):
#   ATTACK_PROFILE=baseline locust -f tests/performance/locustfile.py \
#     --host=http://10.0.1.6:80 --run-time 300s --headless --tags baseline
#
# Push metrics:
#   python scripts/push-locust-metrics.py --csv-dir results --pushgateway http://localhost:9091
# ═══════════════════════════════════════════════════════════════════════════════════

# ═══════════════════════════════════════════════════════════════════════════════════

networks:
  loadgen-net:
    driver: bridge

services:
  # ── NODE EXPORTER (Monitor Locust host) ───────────────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "9100:9100"
    networks:
      - loadgen-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.2"
