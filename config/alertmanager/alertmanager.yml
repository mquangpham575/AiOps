global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "scenario"]
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 2m
  receiver: all-agents

  routes:
    - match:
        severity: info
      receiver: "null"

receivers:
  - name: "null"

  - name: all-agents
    webhook_configs:
      # AI agent
      - url: "http://agent:8080/webhook"
        send_resolved: true
        http_config:
          follow_redirects: true
          authorization:
            credentials: "agent_secret_key_nt531"
      # Rule-based agent (baseline)
      - url: "http://rule-based-agent:5001/alert"
        send_resolved: true
        http_config:
          follow_redirects: true
          authorization:
            credentials: "agent_secret_key_nt531"

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["scenario"]
